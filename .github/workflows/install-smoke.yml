name: Install smoke test

# End-to-end verification of web/install.sh on a real KVM-capable cloud
# guest. We can't run this inside a matchlock VM (Firecracker masks VMX/SVM),
# so we boot a fresh cloud image under QEMU/KVM with -cpu host and run the
# installer there. GitHub-hosted Linux x64 runners have exposed /dev/kvm
# since January 2024.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'web/install.sh'
      - 'scripts/verify-install.sh'
      - 'scripts/verify-install-ubuntu.sh'
      - '.github/workflows/install-smoke.yml'
  pull_request:
    paths:
      - 'web/install.sh'
      - 'scripts/verify-install.sh'
      - 'scripts/verify-install-ubuntu.sh'
      - '.github/workflows/install-smoke.yml'

permissions:
  contents: read

jobs:
  smoke:
    name: Verify install.sh (${{ matrix.os }} ${{ matrix.version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: fedora
            version: '44'
            verify_script: scripts/verify-install.sh
            version_env: FEDORA_VERSION
            cache_key: fedora-44-cloud-qcow2
          - os: ubuntu
            version: '26.04'
            verify_script: scripts/verify-install-ubuntu.sh
            version_env: UBUNTU_VERSION
            cache_key: ubuntu-26.04-cloud-img
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable rw access to /dev/kvm
        run: |
          # GHA's Linux runners expose /dev/kvm to the kvm group; the
          # `runner` user is in it, but tighten perms just in case.
          sudo apt-get update -y
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm
          [ -r /dev/kvm ] && [ -w /dev/kvm ]

      - name: Install host dependencies
        run: |
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 cloud-image-utils openssh-client

      - name: Cache cloud image
        uses: actions/cache@v4
        with:
          path: ~/.cache/yolo-verify
          key: ${{ matrix.cache_key }}

      - name: Run verification script
        env:
          MEM_MB: '3072'
          SMP: '2'
        run: |
          export ${{ matrix.version_env }}='${{ matrix.version }}'
          bash ${{ matrix.verify_script }}

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verify-install-logs-${{ matrix.os }}-${{ matrix.version }}
          path: |
            /tmp/yolo-verify-*/serial.log
            /tmp/yolo-verify-ubuntu-*/serial.log
          if-no-files-found: ignore
